worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_min_length   1000;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m   rate=100r/s;

    # ── Upstream: Odoo HTTP workers ───────────────────────────────
    upstream odoo_backend {
        server odoo:8069 weight=1 fail_timeout=5s max_fails=3;
        keepalive 16;
    }

    # ── Upstream: Odoo gevent (long-polling) ──────────────────────
    upstream odoo_longpolling {
        server odoo-longpolling:8072;
    }

    # ── Proxy common settings ─────────────────────────────────────
    proxy_read_timeout    720s;
    proxy_connect_timeout 30s;
    proxy_send_timeout    720s;

    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header Host              $http_host;

    # ── HTTP → HTTPS redirect + ACME challenge ────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # SSL
        ssl_certificate      /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key  /etc/nginx/ssl/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           SAMEORIGIN                            always;
        add_header X-Content-Type-Options    nosniff                               always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

        # Body size (for large file uploads in Odoo)
        client_max_body_size 200m;

        # ── Static assets: long-lived cache ──────────────────────
        location ~* /web/static/ {
            proxy_cache_valid 200 60d;
            expires 30d;
            add_header Cache-Control "public, immutable";
            proxy_pass http://odoo_backend;
        }

        # ── Login: rate limited ───────────────────────────────────
        location = /web/login {
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://odoo_backend;
        }

        # ── Long polling ──────────────────────────────────────────
        location /longpolling/ {
            proxy_pass http://odoo_longpolling;
        }

        # ── Grafana ───────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Portainer ─────────────────────────────────────────────
        location /portainer/ {
            proxy_pass http://portainer:9000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Odoo main ─────────────────────────────────────────────
        location / {
            proxy_pass        http://odoo_backend;
            proxy_redirect    off;
            proxy_buffering   off;
        }
    }
}

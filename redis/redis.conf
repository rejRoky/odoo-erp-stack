# ── Network ───────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes
# requirepass is injected via --requirepass in docker-compose command

# ── Memory ────────────────────────────────────────────────────────
maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# ── Persistence (RDB snapshots) ───────────────────────────────────
save 300 1
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ── Performance ───────────────────────────────────────────────────
tcp-keepalive 300
timeout 0
tcp-backlog 511
hz 10
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Slow log ──────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Logging ───────────────────────────────────────────────────────
loglevel notice
logfile ""
